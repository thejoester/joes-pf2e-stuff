name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Extract Version From Tag
        id: get_version
        run: echo "version-without-v=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Use tagged manifest for prerelease; latest for stable
      - name: Set manifest URL for channel (stable vs prerelease)
        id: set_manifest
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "manifest_url=https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.json" >> $GITHUB_OUTPUT
          else
            echo "manifest_url=https://github.com/${{ github.repository }}/releases/latest/download/module.json" >> $GITHUB_OUTPUT
          fi

      - name: Modify Module Manifest With Release-Specific Values
        id: sub_manifest_link_version
        uses: microsoft/variable-substitution@v1
        with:
          files: "module.json"
        env:
          version: ${{ steps.get_version.outputs.version-without-v }}
          manifest: ${{ steps.set_manifest.outputs.manifest_url }}
          download: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/joes-pf2e-stuff.zip

      # --- Build packs from committed _source -------------------------------

      - name: Install Foundry CLI
        run: npm install

      - name: Verify extracted packs (no dupes)
        run: node _build/verify-extracted-packs.mjs

      - name: Compile packs from _source
        run: node _build/compile-all-packs.mjs

      # --- Package & publish ------------------------------------------------

      - name: Create Module Archive
        run: |
          mkdir -p dist
          FILES="module.json README.md scripts/ packs/ styles/ assets/"
          [ -f LICENSE.md ] && FILES="$FILES LICENSE.md"
          [ -f LICENSE ] && FILES="$FILES LICENSE"
          [ -f CHANGELOG.md ] && FILES="$FILES CHANGELOG.md"
          zip -r dist/joes-pf2e-stuff.zip $FILES -x "packs/*/_source/*"

      - name: Update Release With Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          draft: ${{ github.event.release.draft }}
          prerelease: ${{ github.event.release.prerelease }}
          name: ${{ steps.get_version.outputs.version-without-v }}
          artifacts: "module.json, dist/joes-pf2e-stuff.zip"
